<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Improve Your English Pronunciation</title>
  <desc id="desc">Ilustração com microfone, ondas sonoras e texto sobre melhoria da pronúncia em inglês.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1425"/>
      <stop offset="0.52" stop-color="#12243b"/>
      <stop offset="1" stop-color="#0f3b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cc7ff"/>
      <stop offset="1" stop-color="#9df0d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="210" fill="#9df0d2" opacity="0.12"/>
  <circle cx="120" cy="610" r="240" fill="#7cc7ff" opacity="0.10"/>
  <path d="M0 520 C210 430 350 650 560 560 C780 465 850 335 1200 430 L1200 720 L0 720 Z" fill="#ffffff" opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="98" y="92" width="1004" height="536" rx="36" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
  </g>

  <g transform="translate(128 138)">
    <rect x="0" y="0" width="230" height="230" rx="34" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
    <g transform="translate(62 42)">
      <rect x="42" y="0" width="66" height="124" rx="33" fill="url(#accent)"/>
      <rect x="61" y="22" width="28" height="76" rx="14" fill="#0b1425" opacity="0.24"/>
      <path d="M0 86 C0 132 34 162 75 162 C116 162 150 132 150 86" fill="none" stroke="#9df0d2" stroke-width="16" stroke-linecap="round"/>
      <path d="M75 162 L75 198" stroke="#9df0d2" stroke-width="16" stroke-linecap="round"/>
      <path d="M42 198 H108" stroke="#9df0d2" stroke-width="16" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(422 160)">
    <text x="0" y="0" fill="#bff5e8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="4">VERBS • ENGLISH PRACTICE</text>
    <text x="0" y="82" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800">Improve Your</text>
    <text x="0" y="164" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800">English Pronunciation</text>
    <text x="0" y="232" fill="#c8d4ea" font-family="Arial, Helvetica, sans-serif" font-size="31">Click, listen and practice common English verbs.</text>
  </g>

  <g transform="translate(430 470)" fill="none" stroke-linecap="round">
    <path d="M0 42 C34 8 68 8 102 42 C136 76 170 76 204 42 C238 8 272 8 306 42" stroke="#7cc7ff" stroke-width="16" opacity="0.85"/>
    <path d="M344 42 C378 8 412 8 446 42 C480 76 514 76 548 42" stroke="#9df0d2" stroke-width="16" opacity="0.85"/>
  </g>
</svg>
